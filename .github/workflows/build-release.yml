name: Build F-Droid Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Extract Version Name
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "VERSION_NAME=$VERSION" >> $GITHUB_ENV

      - name: Build the F-Droid Release APK
        run: ./gradlew assembleFdroidRelease

      - name: Rename the APK
        run: |
          cd app/build/outputs/apk/fdroid/release/
          mv *.apk SoundPod-v${{ env.VERSION_NAME }}-fdroid-release.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundPod-v${{ env.VERSION_NAME }}-fdroid-release
          path: app/build/outputs/apk/fdroid/release/SoundPod-v${{ env.VERSION_NAME }}-fdroid-release.apk
